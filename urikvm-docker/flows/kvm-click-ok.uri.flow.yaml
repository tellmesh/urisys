flow:
  id: kvm-click-ok-demo

defaults:
  approved: true
  dry_run: false

do:
  - kvm://local/monitor/query/list
  - kvm://local/monitor/primary/query/screenshot
  - ocr://local/image/latest/query/text
  - llm://local/vision/query/analyze:
      goal: click OK
      ocr:
        boxes:
          - {text: OK, x: 320, y: 240, w: 60, h: 30}
  - kvm://local/task/command/click-text:
      text: OK
  - kvm://local/task/command/type-text:
      text: Hello from kvm:// via him://
