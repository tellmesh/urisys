[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urikvm"
version = "0.1.1"
description = "kvm:// URI capability pack (screenshot, click-text) for urisys-node"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["urisysedge>=0.1.0"]
keywords = ["uri", "kvm", "screenshot", "urisys"]

[project.optional-dependencies]
real = ["mss>=9.0", "Pillow>=10.0"]

[tool.uv.sources]
urisysedge = { path = "../../../../packages/python/urisysedge", editable = true }

[tool.setuptools]
packages = ["urikvm"]
package-dir = { "urikvm" = "." }
