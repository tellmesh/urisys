[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urivql"
version = "0.1.1"
description = "vql:// URI capability pack (UI verify mock) for urisys-node"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["urisysedge>=0.1.0"]

[tool.setuptools]
packages = ["urivql"]
package-dir = { "urivql" = "." }

[tool.setuptools.package-data]
urivql = ["manifest.yaml"]
