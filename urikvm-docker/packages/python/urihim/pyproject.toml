[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urihim"
version = "0.1.4"
description = "him:// URI capability pack (mouse/keyboard) for urisys-node"
requires-python = ">=3.10"
license = "Apache-2.0"
dependencies = ["urisysedge>=0.1.0"]
keywords = ["uri", "him", "input", "urisys"]

[project.optional-dependencies]
real = ["pyautogui>=0.9.54"]

[tool.uv.sources]
urisysedge = { path = "../../../../packages/python/urisysedge", editable = true }

[tool.setuptools]
packages = ["urihim"]
package-dir = { "urihim" = "." }
