id: urioffice
version: 0.1.1
scheme: urioffice

uri_patterns:
  - pattern: urioffice://{host}/query/status
    kind: query
    operation: office.status
    handler: python://urioffice.handlers:status
    side_effects: false
    approval: not_required

  - pattern: urioffice://{host}/document/command/open
    kind: command
    operation: office.document.open
    handler: python://urioffice.handlers:document_open
    side_effects: true
    approval: required

  - pattern: urioffice://{host}/document/command/save
    kind: command
    operation: office.document.save
    handler: python://urioffice.handlers:document_save
    side_effects: true
    approval: required

  - pattern: urioffice://{host}/document/command/export-pdf
    kind: command
    operation: office.document.export_pdf
    handler: python://urioffice.handlers:document_export_pdf
    side_effects: true
    approval: required

  - pattern: urioffice://{host}/writer/command/render
    kind: command
    operation: office.writer.render
    handler: python://urioffice.handlers:writer_render
    side_effects: true
    approval: required
