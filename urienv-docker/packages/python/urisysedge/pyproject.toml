[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urisysedge"
version = "0.1.0"
description = "Small urisys device runtime for PC/RPi edge nodes"
requires-python = ">=3.10"
dependencies = ["PyYAML>=6.0", "uricore>=0.1.0"]

[project.scripts]
urisys-edge = "urisysedge.cli:main"
urisys = "urisysedge.cli:main"

[tool.setuptools]
package-dir = {"" = "src"}

[tool.setuptools.packages.find]
where = ["src"]
