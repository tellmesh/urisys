[build-system]
requires = ["setuptools>=61.0", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "urioperators"
version = "0.1.0"
description = "Shared OCR/LLM/HIM operator helpers for urikvm and urirdp packs"
readme = "README.md"
requires-python = ">=3.10"
license = "Apache-2.0"
keywords = ["uri", "urisys", "llm", "operators"]

[tool.setuptools]
packages = ["urioperators"]
package-dir = { "urioperators" = "." }

[tool.pytest.ini_options]
testpaths = ["tests"]
