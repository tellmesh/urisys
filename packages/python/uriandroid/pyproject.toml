[build-system]
requires = ["setuptools>=68", "wheel"]
build-backend = "setuptools.build_meta"

[project]
name = "uriandroid"
version = "0.1.0"
description = "URI capability pack for android:// operations."
readme = "README.md"
requires-python = ">=3.10"
license = { text = "MIT" }
dependencies = ["uricore>=0.1.0"]
keywords = ["uri", "urisys", "android", "control-plane"]

[tool.setuptools]
package-dir = {"" = "src"}
include-package-data = true

[tool.setuptools.packages.find]
where = ["src"]
include = ["uriandroid*"]

[tool.setuptools.package-data]
"uriandroid" = ["manifest.yaml"]
