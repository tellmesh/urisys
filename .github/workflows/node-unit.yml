name: node-unit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "urisys-node/**"
      - "packages/python/urisysedge/**"
      - ".github/workflows/node-unit.yml"

jobs:
  node-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -q pytest pyyaml

      - name: urisys-node unit tests (incl. vendored urisysedge drift guard)
        working-directory: urisys-node
        run: PYTHONPATH=packages/python python -m pytest -q
