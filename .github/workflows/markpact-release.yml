# Publish Markpact materialized release to ghcr.io + GitHub raw + markpact.com catalog.
#
# Triggers on version tags: v0.1.0, v1.2.3, ...
# Required secrets:
#   GITHUB_TOKEN (default) — packages:write for ghcr.io
#   MARKPACT_API_TOKEN — Bearer token for markpact.com POST /api/releases
# Optional vars:
#   MARKPACT_URL — default https://markpact.com

name: markpact-release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write
  packages: write

env:
  CONTRACT_ID: uristepper-pack
  CONTRACT_FILE: uristepper-docker/markpacts/uristepper.pack.markpact.md
  IMAGE_NAME: stepper-axis-control
  IMAGE_TARGET: linux-amd64-mock

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Parse version from tag
        id: ver
        run: |
          VERSION="${GITHUB_REF_NAME#v}"
          echo "version=${VERSION}" >> "$GITHUB_OUTPUT"
          echo "git_ref=${GITHUB_REF_NAME}" >> "$GITHUB_OUTPUT"

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install urisys
        run: |
          pip install -e urienv-docker/vendor/uricore
          pip install -e .

      - name: Validate Markpact
        run: |
          urisys markpact validate "$CONTRACT_FILE"
          urisys markpact test "$CONTRACT_FILE"

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.actor }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build and push OCI image
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          GHCR_REGISTRY: ghcr.io/${{ github.repository_owner }}
        run: |
          IMAGE_TAG="ghcr.io/${{ github.repository_owner }}/${IMAGE_NAME}:${VERSION}-${IMAGE_TARGET}"
          docker build -f uristepper-docker/Dockerfile -t "$IMAGE_TAG" uristepper-docker
          docker push "$IMAGE_TAG"
          DIGEST="$(docker inspect --format='{{index .RepoDigests 0}}' "$IMAGE_TAG")"
          echo "IMAGE_REF=${DIGEST}" >> "$GITHUB_ENV"
          echo "IMAGE_TAG=${IMAGE_TAG}" >> "$GITHUB_ENV"

      - name: Generate artifact-index and release files
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          CONTRACT_SHA="sha256:$(sha256sum "$CONTRACT_FILE" | awk '{print $1}')"
          RELEASE_DIR="releases/${CONTRACT_ID}/${VERSION}"
          mkdir -p "$RELEASE_DIR"
          export CONTRACT_SHA RELEASE_DIR
          python3 - <<'PY'
          import json, os
          from pathlib import Path
          payload = {
              "schema": "markpact.artifact-index.v1",
              "contract": {
                  "id": os.environ["CONTRACT_ID"],
                  "version": os.environ["VERSION"],
                  "digest": os.environ["CONTRACT_SHA"],
                  "file": os.environ["CONTRACT_FILE"],
              },
              "artifacts": [{
                  "target": os.environ["IMAGE_TARGET"],
                  "kind": "oci-image",
                  "platform": "linux/amd64",
                  "runtime": "docker",
                  "capabilities": ["mock-stepper", "uri-process"],
                  "ref": os.environ["IMAGE_REF"],
                  "tag": os.environ["IMAGE_TAG"],
              }],
          }
          out = Path(os.environ["RELEASE_DIR"]) / "artifact-index.json"
          out.write_text(json.dumps(payload, indent=2) + "\n", encoding="utf-8")
          PY
          cp "$CONTRACT_FILE" "${RELEASE_DIR}/contract.markpact.md"
          echo "CONTRACT_SHA=${CONTRACT_SHA}" >> "$GITHUB_ENV"
          echo "RELEASE_DIR=${RELEASE_DIR}" >> "$GITHUB_ENV"

      - name: Commit release metadata to tag
        env:
          VERSION: ${{ steps.ver.outputs.version }}
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "41898282+github-actions[bot]@users.noreply.github.com"
          git add "releases/${CONTRACT_ID}/${VERSION}/"
          git diff --staged --quiet || git commit -m "release: ${CONTRACT_ID} ${VERSION} [skip ci]"
          git push origin "HEAD:${{ steps.ver.outputs.git_ref }}"

      - name: Register release on markpact.com
        if: ${{ secrets.MARKPACT_API_TOKEN != '' }}
        env:
          VERSION: ${{ steps.ver.outputs.version }}
          MARKPACT_URL: ${{ vars.MARKPACT_URL || 'https://markpact.com' }}
          MARKPACT_API_TOKEN: ${{ secrets.MARKPACT_API_TOKEN }}
        run: |
          INDEX_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ver.outputs.git_ref }}/releases/${CONTRACT_ID}/${VERSION}/artifact-index.json"
          CONTRACT_URL="https://raw.githubusercontent.com/${{ github.repository }}/${{ steps.ver.outputs.git_ref }}/releases/${CONTRACT_ID}/${VERSION}/contract.markpact.md"
          ARTIFACTS="$(python3 -c "import json; print(json.dumps(json.load(open('${RELEASE_DIR}/artifact-index.json'))['artifacts']))")"
          curl -fsS -X POST "${MARKPACT_URL}/api/releases" \
            -H "Authorization: Bearer ${MARKPACT_API_TOKEN}" \
            -H "Content-Type: application/json" \
            -d "{\"contract_id\":\"${CONTRACT_ID}\",\"version\":\"${VERSION}\",\"contract_digest\":\"${CONTRACT_SHA}\",\"contract_url\":\"${CONTRACT_URL}\",\"artifact_index_url\":\"${INDEX_URL}\",\"artifacts\":${ARTIFACTS},\"source_git_commit\":\"${GITHUB_SHA}\"}"
