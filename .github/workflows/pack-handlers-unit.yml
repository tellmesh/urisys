name: pack-handlers-unit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "urikvm-docker/**"
      - "urirdp-docker/**"
      - "scripts/pack_registry.py"
      - ".github/workflows/pack-handlers-unit.yml"

jobs:
  handlers-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 15

    steps:
      - uses: actions/checkout@v4
        with:
          path: urisys

      - name: Checkout tellmesh sibling repos
        env:
          TELLMESH_ROOT: ${{ github.workspace }}
          URISYS_ROOT: ${{ github.workspace }}/urisys
        run: bash urisys/scripts/ci-checkout-siblings.sh

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps + sibling packs
        working-directory: urisys
        run: |
          pip install -q pytest pyyaml
          bash scripts/ci-install-siblings.sh

      - name: urikvm vision dispatch
        working-directory: urikvm-docker
        run: python -m pytest tests/test_vision_dispatch.py -q

      - name: urirdp decide dispatch
        working-directory: urirdp-docker
        run: python -m pytest tests/test_decide_dispatch.py -q
