name: pack-handlers-unit

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "urikvm-docker/packages/python/**"
      - "urirdp-docker/packages/python/**"
      - "packages/python/urisysedge/**"
      - ".github/workflows/pack-handlers-unit.yml"

jobs:
  handlers-unit:
    # Docker-free unit tests for the LLM decision handlers (driver dispatch).
    # Imports need only stdlib + the canonical urisysedge on PYTHONPATH.
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Install test deps
        run: pip install -q pytest pyyaml

      - name: urikvm vision dispatch
        working-directory: urikvm-docker
        run: PYTHONPATH=packages/python:../packages/python python -m pytest tests/test_vision_dispatch.py -q

      - name: urirdp decide dispatch
        working-directory: urirdp-docker
        run: PYTHONPATH=packages/python:../packages/python python -m pytest tests/test_decide_dispatch.py -q
