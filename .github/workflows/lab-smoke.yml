name: lab-smoke

on:
  workflow_dispatch:
  pull_request:
    paths:
      - "urisys-automation-lab/**"
      - "urirdp-docker/packages/python/**"
      - "scripts/run-smoke-all.sh"
      - "scripts/run-lab-unit-ci.sh"
      - "scripts/run-nl-log-smoke.sh"
      - "scripts/run_test_sessions.py"
      - "scripts/session_report.py"
      - ".github/workflows/lab-smoke.yml"

jobs:
  lab-unit:
    runs-on: ubuntu-latest
    timeout-minutes: 10

    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Lab unit tests
        run: bash scripts/run-lab-unit-ci.sh

  monorepo-smoke:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          path: urisys

      - name: Checkout tellmesh monorepo siblings (optional)
        continue-on-error: true
        run: |
          # Full nl-log smoke needs uri3 + tellmesh/output at repo root.
          if [ -d "../uri3" ]; then
            echo "uri3 found beside urisys"
          else
            echo "skip monorepo smoke — uri3 not available in CI checkout"
            exit 0
          fi

      - uses: astral-sh/setup-uv@v5

      - name: Full smoke (when monorepo layout present)
        working-directory: urisys
        run: |
          if [ -d "../uri3" ] && [ -d "../tellmesh" ]; then
            bash scripts/run-smoke-all.sh
          else
            echo "Skipped run-smoke-all — run locally from tellmesh workspace"
          fi

  lab-e2e:
    # Full Docker/RDP run of lab-10-flows, gating on the `expect:` contracts.
    # Manual only: needs Docker + the tellmesh monorepo siblings to build images.
    runs-on: ubuntu-latest
    timeout-minutes: 30
    if: github.event_name == 'workflow_dispatch'

    steps:
      - uses: actions/checkout@v4
        with:
          path: urisys

      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"

      - name: Run lab-10-flows E2E (skips if monorepo siblings absent)
        working-directory: urisys
        run: |
          # The lab images build from sibling repos (uri3/uri2flow/uri2ops) at the
          # workspace root; without them the Docker build can't run in CI.
          if [ ! -d "../uri3" ] || [ ! -d "../uri2flow" ]; then
            echo "Skipped lab-e2e — run from a full tellmesh checkout (uri3/uri2flow missing)."
            exit 0
          fi
          bash scripts/run-lab-e2e.sh

      - name: Upload session artifacts (screenshots, reports, responses)
        if: always()
        uses: actions/upload-artifact@v4
        with:
          name: lab-10-flows-session
          path: urisys/output/test-sessions/
          if-no-files-found: ignore
