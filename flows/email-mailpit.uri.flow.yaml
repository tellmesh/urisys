flow:
  id: email-mailpit
  description: Unread inbox → LLM summary draft → compose + send (mock/Mailpit SMTP).

defaults:
  approved: true
  dry_run: true
  allow_real: false

do:
  - id: unread
    uri: urimail://local/inbox/query/unread
    payload:
      limit: 5

  - id: summarize
    uri: llm://local/text/query/plan
    after: unread
    payload:
      transcript: "Summarize unread mail and draft a one-line reply"
      allowed_schemes:
        - urimail

  - id: compose
    uri: urimail://local/message/command/compose
    after: summarize
    payload:
      to: team@example.com
      subject: "Re: Weekly report"
      body: "Thanks — I'll review and reply tomorrow."

  - id: send
    uri: urimail://local/message/command/send
    after: compose
    payload:
      to: team@example.com
