flow:
  id: office-writer
  description: LLM text → urioffice writer render → export PDF (mock/LibreOffice).

defaults:
  approved: true
  dry_run: true
  allow_real: false

do:
  - id: plan_text
    uri: llm://local/text/query/plan
    payload:
      transcript: "Office writer: produce a short paragraph about quarterly results"
      allowed_schemes:
        - urioffice

  - id: render
    uri: urioffice://local/writer/command/render
    after: plan_text
    payload:
      title: quarterly-results
      text: "Quarterly results show steady growth across all regions."
      format: txt

  - id: export_pdf
    uri: urioffice://local/document/command/export-pdf
    after: render

expect:
  screen_changed: false
