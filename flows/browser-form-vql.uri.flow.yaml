flow:
  id: browser-form-vql
  description: Open browser page → vql verify → form submit (dry-run, forward browser on slave).

defaults:
  approved: true
  dry_run: true
  allow_real: false

do:
  - id: open
    uri: browser://chrome/page/command/open
    payload:
      url: https://example.com/

  - id: verify
    uri: vql://local/ui/latest/query/detect
    after: open
    payload:
      target: Example

  - id: compare
    uri: vql://local/ui/latest/query/compare
    after: verify
    payload:
      expect:
        changed: true

  - id: submit
    uri: browser://chrome/form/command/submit
    after: compare
    payload:
      form_id: contact
