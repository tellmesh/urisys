flow:
  id: lenovo-upgrade-node
  description: Deploy urisys-node wheel; `urisys node serve` takes over the port (no pkill script).
  target: lenovo

defaults:
  approved: true
  allow_real: true

do:
  - id: pip_urisys_node
    uri: shell://pip
    payload:
      args:
        - install
        - -U
        - "{wheel:urisys_node}"

  - id: deploy_lenovo_profile
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          mkdir -p ~/.config/urisys
          curl -fsS -o ~/.config/urisys/node-profile.lenovo.json \
            http://192.168.188.212:8765/node-profile.lenovo.json
          echo deployed $(wc -c < ~/.config/urisys/node-profile.lenovo.json) bytes

  - id: restart_and_wait
    kind: host_restart_and_wait
    timeout: 90
    settle_s: 4
    expect:
      him_driver: ydotool
    note: Schedule serve, wait for new instance_id + profile him.driver
