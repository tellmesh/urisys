flow:
  id: lenovo-08-kvm-linkedin
  description: >-
    KVM-URI LinkedIn compose — eyes (screen/img2nl/kvm), hands (him), no Playwright.
    Opens native browser, clicks compose via kvm://click-text, types via him://keyboard.
  target: lenovo
  requires:
    - upgrade: flows/lenovo-remote/_upgrade-kvm.uri.flow.yaml

defaults:
  approved: true
  dry_run: false
  allow_real: true

do:
  - id: ensure_kv_worker
    uri: node://lenovo/command/spawn-worker
    payload:
      pack: kv
      install: true
    note: kv:// for session record (idempotent)

  - id: browser_open_feed
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          xdg-open 'https://www.linkedin.com/feed/' 2>/dev/null \
            || sensible-browser 'https://www.linkedin.com/feed/' 2>/dev/null \
            || google-chrome 'https://www.linkedin.com/feed/' 2>/dev/null &
          sleep 2
          echo opened
    note: Open LinkedIn in native browser (KVM-visible desktop, no browser:// pack)

  - id: screen_feed
    uri: screen://lenovo/monitor/1/query/frame
    note: Eyes — capture desktop after browser open

  - id: kvm_screenshot
    uri: kvm://lenovo/monitor/primary/query/screenshot
    note: Store PNG in runtime state for ocr/img2nl chain

  - id: kvm_click_start_post
    uri: kvm://lenovo/task/command/click-text
    payload:
      text: "Start a post"
      skip_screenshot: true
    note: kvm → ocr → llm → him click (human-like)

  - id: screen_compose
    uri: screen://lenovo/monitor/1/query/frame

  - id: him_type_draft
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          TEXT='urisys lenovo flow-08 — KVM-URI draft (screen + him, manual Post click)'
          if command -v ydotool >/dev/null; then ydotool type "$TEXT"; echo ydotool-typed
          elif command -v wtype >/dev/null; then wtype "$TEXT"; echo wtype-typed
          else echo 'SKIP: install ydotool on lenovo for him:// on Wayland'; exit 0
          fi
    note: Hands via ydotool/wtype until him:// has display session (Wayland); prefer him:// when ydotool installed

  - id: screen_after_type
    uri: screen://lenovo/monitor/1/query/frame

  - id: img2nl_find_post
    uri: img2nl://lenovo/image/latest/query/targets
    payload:
      goal: find
    note: Uses latest screen:// PNG from runtime state

  - id: kv_record_kvm
    uri: kv://session/key/linkedin-kvm/command/set
    payload:
      value:
        flow: lenovo-08-kvm-linkedin
        mode: kvm-uri
        driver: screen+him+kvm
      ttl: 86400

  - id: workers_status
    uri: node://lenovo/query/workers
