flow:
  id: lenovo-02-install-packs
  description: Hot-load capability packs on lenovo (kv, browser, office, mail) from dev wheel server.
  target: lenovo
  endpoint: http://192.168.188.201:8790
  requires:
    - wheel_server: http://192.168.188.212:8765

defaults:
  approved: true
  allow_real: true

do:
  - id: install_kv
    uri: node://lenovo/command/install-pack
    wheel: urikv
    payload:
      pack: kv
      install: true
      force: true
    note: urikv — kv:// + log:// introspection

  - id: install_browser
    uri: node://lenovo/command/install-pack
    wheel: uribrowser
    payload:
      pack: browser
      install: true
      force: true

  - id: install_office
    uri: node://lenovo/command/install-pack
    wheel: urioffice
    payload:
      pack: office
      install: true
      force: true

  - id: install_mail
    uri: node://lenovo/command/install-pack
    wheel: urimail
    payload:
      pack: mail
      install: true
      force: true

  - id: packs_after
    uri: node://lenovo/query/packs
