flow:
  id: lenovo-07-playwright-linkedin
  description: LinkedIn compose via CDP to the logged-in Chrome on lenovo (draft; set submit=true to post).
  target: lenovo
  requires:
    - upgrade: flows/lenovo-remote/_upgrade-playwright.uri.flow.yaml

defaults:
  approved: true
  dry_run: false
  allow_real: true

do:
  - id: ensure_kv_worker
    uri: node://lenovo/command/spawn-worker
    payload:
      pack: kv
      install: true
    note: kv:// served by its own worker process (idempotent — reuses a live worker)

  - id: playwright_compose
    uri: browser://linkedin/social/command/publish-post
    payload:
      platform: linkedin
      driver: cdp
      cdp_endpoint: http://127.0.0.1:9222
      submit: false
      text: "urisys lenovo flow-07 — CDP draft (manual submit)"
    note: Connect to running logged-in Chrome (--remote-debugging-port=9222); draft only

  - id: screen_after_playwright
    uri: screen://lenovo/monitor/1/query/frame
    allow_real: true

  - id: kv_record_playwright
    uri: kv://session/key/linkedin-playwright/command/set
    payload:
      value:
        flow: lenovo-07-playwright-linkedin
        driver: cdp
        cdp_endpoint: http://127.0.0.1:9222
      ttl: 86400

  - id: workers_status
    uri: node://lenovo/query/workers
    note: List live capability workers (browser, kv) behind the router
