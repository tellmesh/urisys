flow:
  id: lenovo-04-office-linkedin-dry
  description: Office doc + LinkedIn publish dry-run (no real browser open).
  target: lenovo

defaults:
  approved: true
  dry_run: true
  allow_real: false

do:
  - id: office_create
    uri: urioffice://lenovo/document/command/create
    payload:
      title: LinkedIn session doc
      body: "Test post from lenovo-remote session flow"

  - id: browser_publish_dry
    uri: browser://linkedin/social/command/publish-post
    payload:
      platform: linkedin
      text: "urisys lenovo-remote session — dry run"

  - id: mail_publish_dry
    uri: urimail://lenovo/message/command/publish-post
    payload:
      platform: linkedin
      text: "urisys lenovo-remote session — dry run"
      via: browser

  - id: kv_save_draft
    uri: kv://session/key/linkedin-draft/command/set
    payload:
      value:
        text: "urisys lenovo-remote session — dry run"
        flow: lenovo-04-office-linkedin-dry
      ttl: 86400

  - id: kv_read_draft
    uri: kv://session/key/linkedin-draft/query/get
