flow:
  id: lenovo-01-health-probe
  description: Probe lenovo node reachability — HTTP health, URI identity, packs list.
  target: lenovo
  endpoint: http://192.168.188.201:8790

defaults:
  approved: true
  dry_run: false
  allow_real: true

do:
  - id: http_health
    kind: http_get
    path: /health
    note: Direct GET /health (no URI routing)

  - id: uri_routes
    kind: http_get
    path: /uri/routes
    note: List registered URI patterns on node

  - id: node_health
    uri: node://lenovo/query/health
    note: node pack health via URI call

  - id: node_identity
    uri: node://lenovo/query/identity

  - id: node_packs
    uri: node://lenovo/query/packs
