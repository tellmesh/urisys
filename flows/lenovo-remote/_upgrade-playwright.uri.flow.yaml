flow:
  id: lenovo-upgrade-playwright
  description: Pre-flow-07 upgrade — playwright + uribrowser wheel + hot-reload browser pack (no node restart).
  target: lenovo

defaults:
  approved: true
  allow_real: true

do:
  - id: pip_playwright
    uri: shell://pip
    payload:
      args: ["install", "-U", "playwright>=1.40"]

  - id: shell_playwright_browser
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          source ~/venv/bin/activate 2>/dev/null || true
          python3 -m playwright install chromium 2>&1 | tail -3

  - id: pip_uribrowser
    uri: shell://pip
    payload:
      args:
        - install
        - -U
        - urisysedge>=0.1.0
        - "{wheel:uribrowser}"

  - id: hotload_browser
    uri: node://lenovo/command/install-pack
    wheel: uribrowser
    payload:
      pack: browser
      install: true
      force: true
    note: Hot-reload browser handler in-process after pip (no restart)

  - id: browser_status
    uri: browser://linkedin/query/status
    note: Verify browser routes registered after hotload
