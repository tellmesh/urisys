flow:
  id: lenovo-upgrade-playwright
  description: Pre-flow-07 upgrade — playwright + uribrowser wheel + node restart (runs automatically before flow 07).
  target: lenovo

defaults:
  approved: true
  allow_real: true

do:
  - id: pip_playwright
    uri: shell://pip
    payload:
      args: ["install", "-U", "playwright>=1.40"]

  - id: shell_playwright_browser
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          source ~/venv/bin/activate 2>/dev/null || true
          python3 -m playwright install chromium 2>&1 | tail -3

  - id: pip_uribrowser
    uri: shell://pip
    payload:
      args:
        - install
        - -U
        - urisysedge>=0.1.0
        - "{wheel:uribrowser}"

  - id: restart_node
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          setsid bash -lc '
            sleep 3
            pkill -f "urisys node serve" 2>/dev/null || pkill -f "urisys-node serve" 2>/dev/null || true
            sleep 2
            for v in "$HOME/venv" "$HOME/venv312"; do
              [ -f "$v/bin/activate" ] && . "$v/bin/activate" && break
            done
            export URISYS_ALLOW_REAL=1
            exec urisys node serve --host 0.0.0.0 --port 8790 >> /tmp/urisys-node.log 2>&1
          ' </dev/null >>/tmp/urisys-restart.log 2>&1 &
          echo detached_restart=$!

  - id: wait_restart
    kind: host_wait_health
    timeout: 90
    note: Poll /health from dev host until node returns after setsid restart
