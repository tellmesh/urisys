flow:
  id: lenovo-upgrade-kvm
  description: Pre-flow-08 — hot-load kvm/him/ocr/llm/img2nl packs for human-like KVM-URI control.
  target: lenovo

defaults:
  approved: true
  allow_real: true

do:
  - id: install_kvm
    uri: node://lenovo/command/install-pack
    payload:
      pack: kvm
      install: true
      force: true

  - id: install_him
    uri: node://lenovo/command/install-pack
    payload:
      pack: him
      install: true
      force: true

  - id: install_ocr
    uri: node://lenovo/command/install-pack
    payload:
      pack: ocr
      install: true
      force: true

  - id: install_llm
    uri: node://lenovo/command/install-pack
    payload:
      pack: llm
      install: true
      force: true

  - id: install_browser
    uri: node://lenovo/command/install-pack
    payload:
      pack: browser
      install: true
      force: true

  - id: pip_real_deps
    uri: shell://pip
    payload:
      args:
        - install
        - -U
        - "mss>=9.0"
        - "Pillow>=10.0"
        - "pyautogui>=0.9.54"

  - id: shell_ydotool
    uri: shell://bash
    payload:
      args:
        - -lc
        - |
          if command -v ydotool >/dev/null; then echo ydotool ok; exit 0; fi
          if command -v dnf >/dev/null; then sudo -n dnf install -y ydotool 2>/dev/null || true; fi
          if command -v apt-get >/dev/null; then sudo -n apt-get install -y ydotool 2>/dev/null || true; fi
          command -v ydotool >/dev/null && echo ydotool installed || echo 'ydotool missing — install manually for Wayland HIM'
    note: ydotool required for him:// on GNOME Wayland

  - id: pip_uriimg2nl
    uri: shell://pip
    payload:
      args:
        - install
        - -U
        - "{wheel:uriimg2nl}"

  - id: install_img2nl
    uri: node://lenovo/command/install-pack
    payload:
      pack: img2nl
      install: false
      force: true
    note: Hot-load after pip_uriimg2nl wheel (avoid GitHub pip for uriimg2nl)

  - id: pip_img2nl_lib
    uri: shell://pip
    payload:
      args:
        - install
        - -U
        - "img2nl[analyze]>=0.1.0"
    note: img2nl analyze; imgl[capture] optional on lenovo for capture-click
    note: img2nl library (PyPI); uriimg2nl pack wraps it

  - id: him_status
    uri: him://lenovo/mouse/query/status

  - id: kvm_monitors
    uri: kvm://lenovo/monitor/query/list

  - id: packs_after
    uri: node://lenovo/query/packs
