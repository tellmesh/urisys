flow:
  id: lenovo-05-browser-linkedin-real
  description: Open LinkedIn compose on lenovo desktop (system-open) and verify screen + kv record.
  target: lenovo

defaults:
  approved: true
  dry_run: false
  allow_real: true

do:
  - id: browser_status
    uri: browser://linkedin/query/status
    note: Driver from node-profile (system-open on lenovo)

  - id: browser_compose_open
    uri: browser://linkedin/social/command/publish-post
    payload:
      platform: linkedin
      driver: system-open
      text: "urisys lenovo-remote — real compose (manual submit on lenovo)"
    note: Opens LinkedIn share dialog in native browser; user submits manually

  - id: screen_after_compose
    uri: screen://lenovo/monitor/1/query/frame
    allow_real: true
    note: Capture desktop after browser open (portal backend)

  - id: kv_record_real
    uri: kv://session/key/linkedin-real/command/set
    payload:
      value:
        flow: lenovo-05-browser-linkedin-real
        mode: system-open
        text: "urisys lenovo-remote — real compose (manual submit on lenovo)"
      ttl: 86400

  - id: kv_read_real
    uri: kv://session/key/linkedin-real/query/get
