services:
  urirdp:
    build:
      context: ..
      dockerfile: urirdp-docker/Dockerfile
    container_name: urirdp-gui
    restart: unless-stopped
    env_file:
      - ../.env
    environment:
      RDP_USER: ${RDP_USER:-urisys}
      RDP_PASSWORD: ${RDP_PASSWORD:-urisys}
      URISYS_RDP_PORT: ${URISYS_RDP_PORT:-8795}
      URISYS_KVM_DISPLAY: ${URISYS_KVM_DISPLAY:-:10}
      URISYS_RDP_DISPLAY: ${URISYS_RDP_DISPLAY:-:10}
      URISYS_CONFIG: ${URISYS_CONFIG:-/opt/urirdp/config/rdp-kvm-profile.real.json}
      URISYS_ALLOW_REAL: ${URISYS_ALLOW_REAL:-1}
      URISYS_ENV_POLICY: ${URISYS_ENV_POLICY:-/opt/urirdp/config/env-policy.yaml}
    ports:
      - "${RDP_PORT:-3389}:3389"
      - "${URISYS_RDP_PORT:-8795}:8795"
    volumes:
      - ./data:/opt/urirdp/data
      - ./config:/opt/urirdp/config:ro
