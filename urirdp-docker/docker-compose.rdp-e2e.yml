services:
  urirdp:
    build:
      context: ..
      dockerfile: urirdp-docker/Dockerfile
    container_name: urirdp-real
    env_file:
      - ../.env
    environment:
      RDP_USER: ${RDP_USER:-urisys}
      RDP_PASSWORD: ${RDP_PASSWORD:-urisys}
      URISYS_ALLOW_REAL: "1"
      URISYS_RDP_DISPLAY: ":10"
      URISYS_KVM_DISPLAY: ":10"
      URISYS_RDP_PORT: "8795"
      URISYS_CONFIG: /opt/urirdp/config/rdp-kvm-profile.real.json
    ports:
      - "3389:3389"
      - "8795:8795"
    volumes:
      - ./data:/opt/urirdp/data
      - ./config:/opt/urirdp/config:ro
    healthcheck:
      test: ["CMD", "curl", "-fsS", "http://127.0.0.1:8795/health"]
      interval: 5s
      timeout: 3s
      retries: 30
      start_period: 10s

  rdp-client:
    image: debian:bookworm-slim
    depends_on:
      urirdp:
        condition: service_healthy
    environment:
      DISPLAY: ":99"
      RDP_USER: ${RDP_USER:-urisys}
      RDP_PASSWORD: ${RDP_PASSWORD:-urisys}
    volumes:
      - ./tests:/tests:ro
    command: ["/bin/bash", "/tests/e2e_rdp_real.sh"]
