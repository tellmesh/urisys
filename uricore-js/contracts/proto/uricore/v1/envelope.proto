syntax = "proto3";

package uricore.v1;

service UriControl {
  rpc Call(UriCallRequest) returns (UriCallResponse);
}

message UriCallRequest {
  string uri = 1;
  string payload_json = 2;
  string context_json = 3;
}

message UriCallResponse {
  bool ok = 1;
  string uri = 2;
  string result_json = 3;
  string event_json = 4;
  string error_json = 5;
}

message CommandEnvelope {
  string command_id = 1;
  string uri = 2;
  string command_type = 3;
  bytes payload = 4;
  string payload_content_type = 5;
  map<string, string> metadata = 6;
}

message QueryEnvelope {
  string query_id = 1;
  string uri = 2;
  string query_type = 3;
  bytes payload = 4;
  string payload_content_type = 5;
  map<string, string> metadata = 6;
}

message EventEnvelope {
  string event_id = 1;
  string source_uri = 2;
  string event_type = 3;
  bytes payload = 4;
  string payload_content_type = 5;
  int64 occurred_at_unix_ms = 6;
  map<string, string> metadata = 7;
}
