# Markpact / urisys local materialization lab
# contract → build → OCI registry → artifact-index → markpact.com catalog → node resolve → /uri/call
# Production: ghcr.io + raw.githubusercontent.com (no Nexus)

services:
  oci-registry:
    image: registry:2
    container_name: markpact-oci-registry
    ports:
      - "5000:5000"
    volumes:
      - registry-data:/var/lib/registry

  artifacts-server:
    image: nginx:alpine
    container_name: markpact-artifacts-server
    ports:
      - "${ARTIFACTS_HOST_PORT:-8190}:80"
    volumes:
      - ./generated:/usr/share/nginx/html:ro
    profiles: ["lab"]

  builder:
    build:
      context: ..
      dockerfile: local-lab/builder/Dockerfile
    container_name: markpact-builder
    working_dir: /workspace
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTRACT_ID: uristepper-pack
      VERSION: "0.1.0"
      CONTRACT_FILE: uristepper-docker/markpacts/uristepper.pack.markpact.md
      IMAGE_NAME: stepper-axis-control
      IMAGE_TARGET: linux-amd64-mock
      OCI_REGISTRY_FOR_DOCKER: localhost:5000
      GITHUB_OWNER: tellmesh
      GITHUB_REPO: urisys
      GIT_REF: main
      WORKER_PORT: "8796"
    depends_on:
      oci-registry:
        condition: service_started
    profiles: ["lab"]

  urisys-node-lab:
    build:
      context: ..
      dockerfile: local-lab/node/Dockerfile
    container_name: urisys-node-lab
    working_dir: /workspace
    network_mode: host
    volumes:
      - ..:/workspace
      - /var/run/docker.sock:/var/run/docker.sock
    environment:
      CONTRACT_ID: uristepper-pack
      VERSION: "0.1.0"
      NODE_PROFILE: /workspace/local-lab/node-profile.local.yaml
      ARTIFACT_INDEX: /workspace/local-lab/generated/artifact-index.json
      ARTIFACT_INDEX_URL: http://127.0.0.1:8190/artifact-index.json
      OCI_REGISTRY_FOR_DOCKER: localhost:5000
      WORKER_PORT: "8796"
    depends_on:
      oci-registry:
        condition: service_started
    profiles: ["lab"]

volumes:
  registry-data:
